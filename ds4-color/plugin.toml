id = "hy4ri/ds4-color"
name = "DS4 Color"
version = "0.1.0"
plugin_api = 3
author = "hy4ri"
license = "MIT"
icon = "device-gamepad-2"
description = "Set the DualShock 4 lightbar colour from a bar button and panel."
tags = ["gaming", "hardware", "utility", "bar", "panel"]
dependencies = ["python3"]

[[widget]]
id = "widget"
entry = "widget.luau"

  [[widget.setting]]
  key = "glyph"
  type = "glyph"
  label_key = "settings.glyph.label"
  description_key = "settings.glyph.description"
  default = "device-gamepad-2"

[[panel]]
id = "panel"
entry = "panel.luau"
width = 420
height = 400
placement = "floating"
position = "center"

[[service]]
id = "service"
entry = "service.luau"
